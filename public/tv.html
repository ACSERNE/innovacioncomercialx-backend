<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>ComercialX TV Mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #000;
      color: #00eaff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #00eaff;
    }

    .kpi {
      font-size: 32px;
      margin: 20px 0;
      padding: 20px;
      background: #0d0d0d;
      border-radius: 10px;
      border: 1px solid #00eaff55;
    }

    .label {
      font-size: 18px;
      opacity: 0.7;
    }

    .value {
      font-size: 40px;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h1>📊 ComercialX — TV Mode</h1>

  <div class="kpi">
    <div class="label">Ventas del día:</div>
    <div id="ventasDia" class="value">$0</div>
  </div>

  <div class="kpi">
    <div class="label">Productos vendidos:</div>
    <div id="productosVendidos" class="value">0</div>
  </div>

  <div class="kpi">
    <div class="label">Ticket promedio:</div>
    <div id="ticketPromedio" class="value">$0</div>
  </div>

  <div class="kpi">
    <div class="label">Transacciones:</div>
    <div id="transacciones" class="value">0</div>
  </div>

  <script>
    async function cargarDashboard() {
      try {
        const res = await fetch("/api/dashboard");
        const data = await res.json();

        document.getElementById("ventasDia").innerText =
          "$" + Number(data.totalVentasDia || 0).toLocaleString();

        document.getElementById("productosVendidos").innerText =
          Number(data.productosVendidosDia || 0);

        document.getElementById("ticketPromedio").innerText =
          "$" + Number(data.ticketPromedioDia || 0).toLocaleString();

        document.getElementById("transacciones").innerText =
          Number(data.cantidadTransaccionesDia || 0);

      } catch (err) {
        console.error("Error cargando dashboard:", err);
      }
    }

    cargarDashboard();
    setInterval(cargarDashboard, 5000);
  </script>
</body>
</html>
