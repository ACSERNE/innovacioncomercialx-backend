<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Administrador</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; }
    .kpi { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    .kpi h2 { margin: 0; }
  </style>
</head>
<body>

<h1>Dashboard Global del Marketplace</h1>

<div id="kpis"></div>

<script>
async function cargarDashboard() {
  const token = localStorage.getItem("token");

  const res = await fetch("/api/admin/dashboard", {
    headers: { "Authorization": "Bearer " + token }
  });

  const data = await res.json();

  document.getElementById("kpis").innerHTML = `
    <div class="kpi"><h2>Proveedores: ${data.data.totalProveedores}</h2></div>
    <div class="kpi"><h2>Tiendas: ${data.data.totalTiendas}</h2></div>
    <div class="kpi"><h2>Productos: ${data.data.totalProductos}</h2></div>
    <div class="kpi"><h2>Ventas: ${data.data.totalVentas}</h2></div>
    <div class="kpi"><h2>Stock Global: ${data.data.stockGlobal}</h2></div>
    <div class="kpi"><h2>Productos sin stock: ${data.data.productosSinStock}</h2></div>
  `;
}

cargarDashboard();
</script>

</body>
</html>
