<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>ComercialX Cockpit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .loader {
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    .logo {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 20px;
      letter-spacing: 2px;
      color: #00eaff;
      text-shadow: 0 0 10px #00eaff;
    }

    .spinner {
      border: 6px solid #333;
      border-top: 6px solid #00eaff;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      margin: 0 auto;
      animation: spin 1s linear infinite;
    }

    .text {
      margin-top: 20px;
      font-size: 18px;
      opacity: 0.8;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <script>
    setTimeout(() => {
      window.location.href = "/dashboard";
    }, 2000);
  </script>
</head>

<body>
  <div class="loader">
    <div class="logo">ComercialX</div>
    <div class="spinner"></div>
    <div class="text">Cargando cockpit...</div>
  </div>
</body>
</html>
