version: "3.9"

services:
  backend:
    build: .
    container_name: backend-innovacion
    restart: always
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=production
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres-innovacion
    restart: always
    environment:
      POSTGRES_USER: innovacion
      POSTGRES_PASSWORD: innovacion123
      POSTGRES_DB: innovaciondb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
