services:
  postgres:
    image: postgres:15
    container_name: postgres-innovacion
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "valdez98/224"
      POSTGRES_DB: innovacion_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-innovacion
    environment:
      PGADMIN_DEFAULT_EMAIL: innovacioncomercialx@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin_config/servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres
    restart: unless-stopped

  backend:
    build:
      context: ./innovacioncomercialx-backend
    container_name: backend-innovacion
    ports:
      - "5002:5002"
    env_file:
      - ./innovacioncomercialx-backend/.env
    environment:
      - PORT=5002
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=valdez98/224
      - DB_NAME=innovacion_db
      - JWT_SECRET=supersecreto
    depends_on:
      - postgres
    working_dir: /app
    volumes:
      - ./innovacioncomercialx-backend:/app
    command: ["node", "app.js"]
    restart: unless-stopped

  frontend:
    build:
      context: ./innovacioncomercialx-frontend
      dockerfile: Dockerfile
    container_name: frontend-innovacion
    ports:
      - "8081:80"
    restart: always

volumes:
  pgdata:
  pgadmin_data:
